services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: holocron
      POSTGRES_PASSWORD: holocron
      POSTGRES_DB: holocron
    ports:
      - "5432:5432"
    volumes:
      - ${HOLOCRON_DATA:-~/.holocron/data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U holocron"]
      interval: 5s
      timeout: 5s
      retries: 5

  agents:
    image: ghcr.io/hatif03/holocron-agents:0.1.0
    ports:
      - "8000:8000"
    env_file:
      - ${HOLOCRON_ENV_FILE:-~/.holocron/.env}
    depends_on:
      postgres:
        condition: service_healthy

  latex:
    image: ghcr.io/hatif03/holocron-latex:0.1.0
    ports:
      - "8081:8080"

  web:
    image: ghcr.io/hatif03/holocron-web:0.1.0
    ports:
      - "3000:3000"
    env_file:
      - ${HOLOCRON_ENV_FILE:-~/.holocron/.env}
    depends_on:
      - postgres
      - agents
