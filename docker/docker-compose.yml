services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: holocron
      POSTGRES_PASSWORD: holocron
      POSTGRES_DB: holocron
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U holocron"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 60s

  agents:
    build:
      context: ../apps/agents
      dockerfile: Dockerfile
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-k2think}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      K2THINK_API_KEY: ${K2THINK_API_KEY:-mock-key-for-dev}
      K2THINK_BASE_URL: ${K2THINK_BASE_URL:-https://api.k2think.ai/v1/chat/completions}
      K2THINK_MODEL: ${K2THINK_MODEL:-MBZUAI-IFM/K2-Think-v2}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      SEMANTIC_SCHOLAR_API_KEY: ${SEMANTIC_SCHOLAR_API_KEY:-}
      DATABASE_URL: postgresql://holocron:holocron@postgres:5432/holocron
      STORAGE_PATH: /data/storage
      TEMPLATES_PATH: /app/templates
      LATEX_SERVICE_URL: http://latex:8080
      SUPERMEMORY_API_URL: http://host.docker.internal:6767
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../apps/agents:/app
      - ../templates:/app/templates:ro
      - ../storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      supermemory:
        condition: service_healthy
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  latex:
    build:
      context: ./latex
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    volumes:
      - ../storage:/data/storage

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      target: dev
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://holocron:holocron@postgres:5432/holocron
      AGENTS_SERVICE_URL: http://agents:8000
      NEXT_PUBLIC_AGENTS_URL: http://localhost:8000
      STORAGE_PATH: /data/storage
      AUTH_MODE: local
      LATEX_SERVICE_URL: http://latex:8080
      K2THINK_API_KEY: ${K2THINK_API_KEY:-mock-key-for-dev}
      SUPERMEMORY_API_URL: http://host.docker.internal:6767
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../apps/web:/app/apps/web
      - ../packages:/app/packages
      - ../storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      agents:
        condition: service_started
      supermemory:
        condition: service_healthy
    command: npm run dev --workspace=web

  supermemory:
    build: ./supermemory
    ports:
      - "6767:6767"
    env_file:
      - ../.env
    environment:
      SUPERMEMORY_DATA_DIR: /data
      OPENAI_API_KEY: ${K2THINK_API_KEY:-mock-key-for-dev}
      OPENAI_BASE_URL: ${K2THINK_BASE_URL:-https://api.k2think.ai/v1/chat/completions}
      OPENAI_MODEL: ${K2THINK_MODEL:-MBZUAI-IFM/K2-Think-v2}
      SUPERMEMORY_EMBEDDING_RAM_LIMIT: 2gb
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - supermemory_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:6767/v4/openapi >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    restart: unless-stopped

volumes:
  postgres_data:
  storage_data:
  supermemory_data:
