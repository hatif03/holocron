name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=@holocron/shared

      - name: Build CLI
        run: npm run build --workspace=holocron-research

      - name: Lint web
        run: npm run lint --workspace=web

      - name: Build web
        run: npm run build --workspace=web
        env:
          DATABASE_URL: postgresql://holocron:holocron@localhost:5432/holocron

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate agents imports
        run: |
          pip install -r requirements.txt
          python -c "from src.main import app; print(app.title)"
        working-directory: apps/agents

  test-shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run test --workspace=@holocron/shared

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=@holocron/shared
      - run: npm run test --workspace=web

  test-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run test --workspace=holocron-research

  test-cli-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: node scripts/copy-cli-migrations.mjs
      - run: npm run build --workspace=holocron-research
      - name: Pack and smoke-test CLI
        working-directory: packages/cli
        run: |
          npm pack
          npm install -g holocron-research-1.0.0.tgz
          holocron --version
          holocron install-guide | head -5

  test-marketing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=marketing

  test-agents:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run pytest
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          pytest
        working-directory: apps/agents
        env:
          K2THINK_API_KEY: mock-key-for-dev
          DATABASE_URL: postgresql://holocron:holocron@localhost:5432/holocron
          STORAGE_PATH: ./storage
